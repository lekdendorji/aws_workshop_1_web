<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DK Bank – Demo</title>
    <link href="/styles/main.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Branding -->
        <header class="flex justify-center mb-8">
            <img src="/images/dk_logo.png" alt="DK Bank" class="h-16 object-contain" />
        </header>

        <!-- Login section -->
        <section id="login-section" class="hidden bg-white rounded-xl shadow-md p-6">
            <h1 class="text-xl font-semibold text-slate-800 mb-4 text-center">Log in</h1>
            <form id="login-form" class="space-y-4">
                <div>
                    <label for="login-username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="login-username" name="username" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
                </div>
                <div>
                    <label for="login-password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="login-password" name="password" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
                </div>
                <p id="login-error" class="text-sm text-red-600 min-h-5"></p>
                <button type="submit" id="login-btn" class="group w-full py-2 px-4 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-70 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2">
                    <span class="group-[.loading]:hidden">Log in</span>
                    <span class="hidden group-[.loading]:inline-flex items-center justify-center gap-2">
                        <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin" aria-hidden="true"></div>
                        Loading...
                    </span>
                </button>
            </form>
            <p class="mt-4 text-center text-sm text-slate-600">
                Need an account? <a href="#" id="show-signup" class="text-blue-600 hover:underline font-medium">Sign up</a>
            </p>
        </section>

        <!-- Signup section -->
        <section id="signup-section" class="hidden bg-white rounded-xl shadow-md p-6">
            <h1 class="text-xl font-semibold text-slate-800 mb-4 text-center">Create an account</h1>
            <form id="signup-form" class="space-y-4">
                <div>
                    <label for="signup-username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="signup-username" name="username" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
                </div>
                <div>
                    <label for="signup-password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="signup-password" name="password" required minlength="6"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
                </div>
                <div>
                    <label for="signup-password-confirm" class="block text-sm font-medium text-slate-700 mb-1">Re-enter password</label>
                    <input type="password" id="signup-password-confirm" name="passwordConfirm" required minlength="6"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
                </div>
                <p id="signup-error" class="text-sm text-red-600 min-h-5"></p>
                <button type="submit" id="signup-btn" class="group w-full py-2 px-4 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-70 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2">
                    <span class="group-[.loading]:hidden">Sign up</span>
                    <span class="hidden group-[.loading]:inline-flex items-center justify-center gap-2">
                        <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin" aria-hidden="true"></div>
                        Loading...
                    </span>
                </button>
            </form>
            <p class="mt-4 text-center text-sm text-slate-600">
                Already have an account? <a href="#" id="show-login" class="text-blue-600 hover:underline font-medium">Log in</a>
            </p>
        </section>

        <!-- Dashboard section -->
        <section id="dashboard-section" class="hidden bg-white rounded-xl shadow-md p-6">
            <h1 class="text-xl font-semibold text-slate-800 mb-2 text-center">Dashboard</h1>
            <p class="text-slate-600 text-center mb-4">Welcome! You're logged in.</p>
            <button type="button" id="logout-btn" class="w-full py-2 px-4 border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Log out
            </button>
        </section>
    </div>

    <script type="module" src="/scripts/main.js"></script>
</body>
</html>
